[advisories]
version = 2
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]

[bans]
multiple-versions = "deny"
wildcards = "deny"
# Intra-workspace `{ path = … }` deps appear as wildcard `*` requirements; allow
# those while still catching real wildcard registry deps.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# xpress-huffman is pinned to the SecurityRonin repo until it is published to
# crates.io (then this entry and the git dep both go away).
allow-git = ["https://github.com/SecurityRonin/xpress-huffman"]
